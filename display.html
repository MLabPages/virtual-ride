<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b1020">
<meta name="color-scheme" content="dark">
<meta name="description" content="バーチャルライドをPC・モニター・VRに大きく表示するための画面。">
<title>バーチャルライド 表示画面 | PC・モニター</title>
<link rel="preconnect" href="https://unpkg.com" crossorigin>
<link rel="preconnect" href="https://assets.mixkit.co" crossorigin>
<style>
  :root{--bg:#0b1020;--text:#f2f5ff;--dim:#9aa3bf;--accent:#4dd2a4;--panel:rgba(13,18,38,.72);--border:rgba(255,255,255,.12);}
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--text);
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic UI","Segoe UI",system-ui,sans-serif;overflow:hidden;}
  button{font:inherit;} button:focus-visible{outline:3px solid var(--accent);outline-offset:3px;}
  .sceneVideo{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;background:#000;opacity:0;transition:opacity .38s ease;z-index:0;}
  .sceneVideo.active{opacity:1;z-index:1;}
  #sceneFade{position:fixed;inset:0;pointer-events:none;background:rgba(4,7,14,.86);opacity:0;transition:opacity .45s ease;z-index:3;}
  #sceneFade.visible{opacity:1;}
  #dim{position:fixed;inset:0;pointer-events:none;
    background:linear-gradient(to top,rgba(0,0,0,.5),transparent 28%);z-index:2;}

  /* ペア待ち画面 */
  #pair{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle at 50% 40%,#16204a,#0b1020);text-align:center;padding:24px;}
  #pair.hidden{display:none;}
  .pairCard{max-width:560px;width:100%;}
  .pairTitle{margin:0;font-size:26px;font-weight:800;}
  .pairLead{color:var(--dim);margin-top:10px;font-size:16px;line-height:1.8;}
  .codeBox{margin:26px auto;font-size:clamp(48px,12vw,72px);font-weight:800;letter-spacing:.2em;
    color:var(--accent);font-variant-numeric:tabular-nums;
    background:var(--panel);border:1px solid var(--border);border-radius:18px;
    padding:16px 22px;display:inline-block;min-width:min(280px,100%);}
  .codeHint{color:var(--dim);font-size:14px;}
  #pairStatus{margin-top:16px;color:var(--accent);font-size:15px;min-height:22px;}
  .pairActions{display:flex;justify-content:center;gap:10px;margin-top:18px;flex-wrap:wrap;}

  /* 走行中HUD */
  #hud{position:fixed;z-index:3;top:max(18px,env(safe-area-inset-top));left:max(18px,env(safe-area-inset-left));
    width:min(540px,calc(100vw - 36px));padding:16px 22px;background:rgba(9,14,30,.84);
    border:1px solid var(--border);border-radius:18px;backdrop-filter:blur(10px);box-shadow:0 18px 48px rgba(0,0,0,.28);
    transition:width .25s ease,padding .25s ease;}
  #hud.hidden{display:none;}
  .spd{display:flex;align-items:baseline;gap:8px;}
  #spdVal{font-size:64px;font-weight:800;line-height:1;color:var(--accent);font-variant-numeric:tabular-nums;}
  .unit{color:var(--dim);font-size:18px;}
  .sub{margin-top:8px;color:var(--dim);font-size:15px;}
  .sub b{color:var(--text);}
  .routeHead,.routeMeta{display:flex;justify-content:space-between;gap:14px;align-items:center;}
  .routeHead{margin-top:12px;font-size:14px;font-weight:700;}
  #sceneName{overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
  #routePct{color:var(--accent);font-variant-numeric:tabular-nums;}
  .routeTrack{height:6px;margin-top:8px;border-radius:99px;overflow:hidden;background:rgba(255,255,255,.14);}
  #routeBar{width:0;height:100%;background:linear-gradient(90deg,var(--accent),#8ce8cb);transition:width .35s;}
  .routeMeta{margin-top:7px;color:var(--dim);font-size:12px;}
  #sessionMeta{font-variant-numeric:tabular-nums;}

  #rideState{position:fixed;z-index:2;inset:0;display:flex;align-items:center;justify-content:center;
    pointer-events:none;background:rgba(4,7,14,.34);font-size:clamp(20px,3vw,32px);font-weight:800;
    text-shadow:0 2px 18px rgba(0,0,0,.8);transition:opacity .35s;}
  #rideState.hidden{opacity:0;}

  #controls{position:fixed;z-index:4;bottom:max(18px,env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);
    display:flex;gap:12px;align-items:center;transition:opacity .25s ease,transform .25s ease;}
  .btn{min-height:44px;padding:12px 20px;border-radius:999px;border:1px solid var(--border);
    background:var(--panel);color:var(--text);font-size:15px;cursor:pointer;backdrop-filter:blur(8px);}
  .btn.primary{background:var(--accent);color:#06281c;border:none;font-weight:700;}
  .btn[hidden]{display:none;}
  #reconnectNote{position:fixed;z-index:4;bottom:max(76px,calc(env(safe-area-inset-bottom) + 70px));left:50%;transform:translateX(-50%);
    max-width:calc(100vw - 32px);padding:9px 14px;border-radius:999px;background:var(--panel);
    color:var(--dim);font-size:13px;text-align:center;}
  body.displayFocus #hud{width:auto;padding:13px 18px;}
  body.displayFocus #hud .sub,body.displayFocus #hud .routeHead,body.displayFocus #hud .routeTrack,body.displayFocus #hud .routeMeta{display:none;}
  body.displayFocus #controls{opacity:0;transform:translate(-50%,12px);pointer-events:none;}
  @media(max-width:560px){#hud{padding:13px 16px;}#spdVal{font-size:48px}.pairTitle{font-size:22px}.pairLead{font-size:14px}}
  @media(max-height:480px) and (orientation:landscape){#hud{top:8px;left:8px;width:min(470px,calc(100vw - 16px));padding:10px 16px}#spdVal{font-size:42px}.routeHead{margin-top:7px}.sub{margin-top:5px}#controls{bottom:8px}}
  @media(prefers-reduced-motion:reduce){*{transition-duration:.01ms!important}#sceneFade{display:none}}
</style>
</head>
<body>
  <video id="videoA" class="sceneVideo active" playsinline muted preload="auto" aria-hidden="true"></video>
  <video id="videoB" class="sceneVideo" playsinline muted preload="auto" aria-hidden="true"></video>
  <div id="dim" aria-hidden="true"></div>
  <div id="sceneFade" aria-hidden="true"></div>
  <div id="rideState" aria-hidden="false">ペダルを漕ぐと出発します</div>

  <div id="pair">
    <div class="pairCard">
      <h1 class="pairTitle">🚴 バーチャルライド 表示画面</h1>
      <div class="pairLead">
        スマホのアプリで「🖥 表示画面」を開き、<br>下のコードを入力してください。
      </div>
      <div class="codeBox" id="codeBox">····</div>
      <div class="codeHint">この4桁をスマホに入力すると接続します</div>
      <div id="pairStatus" role="status" aria-live="polite">コードを準備中…</div>
      <div class="pairActions">
        <button id="demoBtn" class="btn primary" type="button">18 km/hで試運転</button>
      </div>
    </div>
  </div>

  <div id="hud" class="hidden" role="region" aria-label="走行情報">
    <div class="spd"><span id="spdVal">0.0</span><span class="unit">km/h</span></div>
    <div class="sub"><span id="rpmVal">–</span> rpm ・ ×<b id="rateVal">0.0</b> ・ <span id="sessionMeta">0.00 km / 0:00</span></div>
    <div class="routeHead"><span id="sceneName"></span><span id="routePct">0%</span></div>
    <div id="displayRouteTrack" class="routeTrack" role="progressbar" aria-label="ルート進捗" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"><div id="routeBar"></div></div>
    <div class="routeMeta"><span id="nextName">次の景色</span><span id="routeRemaining">残り時間</span></div>
  </div>

  <div id="controls">
    <button id="vrBtn" class="btn primary" hidden>🥽 VRで見る</button>
    <button id="pairBtn" class="btn" type="button" hidden>接続画面に戻る</button>
    <button id="fsBtn" class="btn" type="button" aria-label="全画面表示を切り替える">⛶ 全画面</button>
  </div>
  <div id="reconnectNote" role="status" aria-live="polite" hidden></div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script src="scenes.js"></script>
<script src="link.js"></script>
<script type="module" src="display.js"></script>
</body>
</html>
