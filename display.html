<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b1020">
<title>バーチャルライド 表示画面 | PC・モニター</title>
<style>
  :root{--bg:#0b1020;--text:#f2f5ff;--dim:#9aa3bf;--accent:#4dd2a4;--panel:rgba(13,18,38,.72);--border:rgba(255,255,255,.12);}
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--text);
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic UI","Segoe UI",system-ui,sans-serif;overflow:hidden;}
  #video{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;background:#000;}
  #sceneFade{position:fixed;inset:0;pointer-events:none;background:rgba(4,7,14,.86);opacity:0;transition:opacity .45s ease;z-index:2;}
  #sceneFade.visible{opacity:1;}
  #dim{position:fixed;inset:0;pointer-events:none;
    background:linear-gradient(to top,rgba(0,0,0,.5),transparent 28%);}

  /* ペア待ち画面 */
  #pair{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle at 50% 40%,#16204a,#0b1020);text-align:center;padding:24px;}
  #pair.hidden{display:none;}
  .pairCard{max-width:560px;}
  .pairTitle{font-size:26px;font-weight:800;}
  .pairLead{color:var(--dim);margin-top:10px;font-size:16px;line-height:1.8;}
  .codeBox{margin:26px auto;font-size:72px;font-weight:800;letter-spacing:16px;
    color:var(--accent);font-variant-numeric:tabular-nums;
    background:var(--panel);border:1px solid var(--border);border-radius:18px;
    padding:16px 28px;display:inline-block;min-width:280px;}
  .codeHint{color:var(--dim);font-size:14px;}
  #pairStatus{margin-top:16px;color:var(--accent);font-size:15px;min-height:22px;}

  /* 走行中HUD */
  #hud{position:fixed;top:28px;left:28px;padding:16px 24px;background:var(--panel);
    border:1px solid var(--border);border-radius:18px;backdrop-filter:blur(8px);}
  #hud.hidden{display:none;}
  .spd{display:flex;align-items:baseline;gap:8px;}
  #spdVal{font-size:64px;font-weight:800;line-height:1;color:var(--accent);font-variant-numeric:tabular-nums;}
  .unit{color:var(--dim);font-size:18px;}
  .sub{margin-top:8px;color:var(--dim);font-size:15px;}
  .sub b{color:var(--text);}

  #controls{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    display:flex;gap:12px;align-items:center;}
  .btn{padding:12px 20px;border-radius:999px;border:1px solid var(--border);
    background:var(--panel);color:var(--text);font-size:15px;cursor:pointer;backdrop-filter:blur(8px);}
  .btn.primary{background:var(--accent);color:#06281c;border:none;font-weight:700;}
  .btn[hidden]{display:none;}
  #sceneName{color:var(--dim);font-size:14px;align-self:center;}
  #reconnectNote{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
    color:var(--dim);font-size:13px;}
</style>
</head>
<body>
  <video id="video" playsinline muted preload="auto"></video>
  <div id="dim"></div>
  <div id="sceneFade"></div>

  <div id="pair">
    <div class="pairCard">
      <div class="pairTitle">🚴 バーチャルライド 表示画面</div>
      <div class="pairLead">
        スマホのアプリで「🖥 表示画面」を開き、<br>下のコードを入力してください。
      </div>
      <div class="codeBox" id="codeBox">····</div>
      <div class="codeHint">この4桁をスマホに入力すると接続します</div>
      <div id="pairStatus">コードを準備中…</div>
    </div>
  </div>

  <div id="hud" class="hidden">
    <div class="spd"><span id="spdVal">0.0</span><span class="unit">km/h</span></div>
    <div class="sub"><span id="rpmVal">–</span> rpm ・ ×<b id="rateVal">0.0</b></div>
  </div>

  <div id="controls">
    <span id="sceneName"></span>
    <button id="vrBtn" class="btn primary" hidden>🥽 VRで見る</button>
    <button id="fsBtn" class="btn">⛶ 全画面</button>
  </div>
  <div id="reconnectNote" hidden></div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>
<script src="scenes.js"></script>
<script src="link.js"></script>
<script type="module" src="display.js"></script>
</body>
</html>
